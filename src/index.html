<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shacl-ui.js</title>
    <link rel="stylesheet" href="index.css" />
    <script type="module" src="/lib/shacl-renderer.ts"></script>
  </head>
  <body>
    <form class="mx-auto max-w-4xl sm:px-6 lg:px-8 mt-6" id="shacl-form" action="#">
      <shacl-renderer
              useLightDom
              id="shacl-renderer"
              dataGraphUrl="/src/assets/data.ttl"
              shapesGraphUrl="/src/assets/ui-shape.ttl"
              widgetScoringGraphUrl="/src/assets/widget-scoring.ttl"
              focusNode="http://example.org/alice"
              constraintShape="http://example.org/PersonShape"
      >
      </shacl-renderer>

      <button type="submit" class="my-4 px-4 py-2 bg-gray-700 hover:bg-gray-800 text-white rounded">Get Data</button>
    </form>
  </body>

<script type="module">
  const form = document.getElementById('shacl-form');
  const shaclRenderer = document.getElementById('shacl-renderer');

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const data = await shaclRenderer.data('text/turtle');
    console.log('Current Data Graph:', `\n${data}`);
  });
</script>
</html>
