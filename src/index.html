<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shacl-ui.js</title>
    <link rel="stylesheet" href="index.css" />
    <script type="module" src="/lib/shacl-renderer.ts"></script>
  </head>
  <body>
    <div class="mx-auto max-w-4xl sm:px-6 lg:px-8 mt-6">
      <shacl-renderer
              useLightDom
              id="shacl-renderer"
              dataGraphUrl="/src/assets/data.ttl"
              shapesGraphUrl="/src/assets/ui-shape.ttl"
              widgetScoringGraphUrl="/src/assets/widget-scoring.ttl"
              focusNode="http://example.org/Alice"
              constraintShape="http://example.org/PersonShape"
      >
      </shacl-renderer>

      <button id="get-data-btn" class="mt-4 px-4 py-2 bg-gray-700 hover:bg-gray-800 text-white rounded">Get Data</button>
    </div>
  </body>

<script type="module">
  const getDataBtn = document.getElementById('get-data-btn');
  const shaclRenderer = document.getElementById('shacl-renderer');

  getDataBtn.addEventListener('click', async () => {
    const data = await shaclRenderer.data('text/turtle');
    console.log('Current Data Graph:', `\n${data}`);
  });
</script>
</html>
